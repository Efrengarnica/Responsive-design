<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Design</title>
    <link rel="stylesheet" href="./responsive_design.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

                <div class="product">14</div>

                <div class="product">16</div>
                <div class="product">17</div>
                <div class="product">18</div>
                <div class="product">19</div>
            </div>
        </div>
        <footer>
            <a href="#"> <img src="./assets/icons/icons8-facebook.svg" alt="Icono Facebook"> </a>
            <a href="#"><img src="./assets/icons/icons8-instagram.svg" alt="Icono Instagram"></a>
            <a href="#"><img src="./assets/icons/icons8-tiktok.svg" alt="Icono Tiktok"></a>
            <a href="#"><img src="./assets/icons/icons8-whatsapp.svg" alt="Icono WhatsApp"></a>
        </footer>
    </div>
</body>
</html>
